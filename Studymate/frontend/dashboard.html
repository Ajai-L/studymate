<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Studymate</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <h1 class="logo">Studymate</h1>
                <ul class="nav-menu">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="study-groups.html">Study Groups</a></li>
                    <li><a href="resources.html">Resources</a></li>
                    <li><a href="progress.html">Progress</a></li>
                    <li><a href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section id="dashboard">
            <div class="container">
                <h2>Welcome to your Dashboard</h2>
                
                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <h3>Study Groups</h3>
                        <p id="study-groups-count">Loading...</p>
                        <button onclick="window.location.href='study-groups.html'">View Groups</button>
                    </div>
                    
                    <div class="dashboard-card">
                        <h3>Resources</h3>
                        <p id="resources-count">Loading...</p>
                        <button onclick="window.location.href='resources.html'">Browse Resources</button>
                    </div>
                    
                    <div class="dashboard-card">
                        <h3>Progress</h3>
                        <p id="progress-summary">Loading...</p>
                        <button onclick="window.location.href='progress.html'">View Progress</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
    <script>
        // Load dashboard data
        async function loadDashboardData() {
            try {
                const headers = getAuthHeaders();
                
                // Get study groups count
                const groupsResponse = await fetch(`${API_BASE_URL}/groups`, { headers });
                if (groupsResponse.ok) {
                    const groups = await groupsResponse.json();
                    document.getElementById('study-groups-count').textContent = `${groups.length} groups`;
                }
                
                // Get resources count
                const resourcesResponse = await fetch(`${API_BASE_URL}/resources`, { headers });
                if (resourcesResponse.ok) {
                    const resources = await resourcesResponse.json();
                    document.getElementById('resources-count').textContent = `${resources.length} resources`;
                }
                
                // Get progress summary
                const progressResponse = await fetch(`${API_BASE_URL}/analytics/progress`, { headers });
                if (progressResponse.ok) {
                    const progress = await progressResponse.json();
                    document.getElementById('progress-summary').textContent = `${progress.completed || 0} completed`;
                }
                
            } catch (error) {
                console.error('Error loading dashboard data:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
</body>
</html>
